; IMU Robotic Arm - ESP32 Controller (Sender/Wearable)
; Board: ESP32-S3-WROOM-1-N16R8, Revision v1.0
; Toolchain: PlatformIO + Arduino framework

[env:esp32s3-controller]
platform                        = espressif32
board                           = esp32-s3-devkitc-1
framework                       = arduino

; N16R8: 16 MB Flash, 8 MB Octal PSRAM (GPIO35/36/37 intern belegt)
board_upload.flash_size         = 16MB
board_build.flash_mode          = qio
board_build.arduino.memory_type = qio_opi

; Serieller Monitor fuer Bringup und Diagnose
monitor_speed                   = 115200

; Debug-UART freihalten (GPIO43/44 = Standard-UART0)
; Kein WLAN in v1
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
