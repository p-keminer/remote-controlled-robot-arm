# ============================================================
# Mosquitto ACL — Prinzip der minimalen Rechte
# ============================================================

# Bridge-ESP32: darf nur auf robotarm/# publishen
user bridge
topic write robotarm/#

# Dashboard WebSocket (Browser): nur lesen
user dashboard_ws
topic read robotarm/#

# MCP Server (Claude): nur lesen
user mcp_reader
topic read robotarm/#

# Kein User darf auf fremde Topics zugreifen
# Kein User darf Steuerbefehle senden
