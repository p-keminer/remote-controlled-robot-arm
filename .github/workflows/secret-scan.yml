name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Secret-Scan ausfuehren
        run: bash scripts/secret_scan.sh

      - name: Ergebnis bei Fehler
        if: failure()
        run: |
          echo "::error::Secret-Scan fehlgeschlagen! Secrets, IPs oder Passwoerter in getrackten Dateien gefunden."
          echo "Siehe Log oben fuer Details."
